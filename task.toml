schema_version = "1.3"
# Alias for reviewer tooling that expects a top-level "version" key.
version = "2.0"

[task]
name = "snorkel/recover-mtls-trust-graphs-postgresql"
description = "Implement a fail-closed C++ access-control enforcement binary that reconstructs a corrupted mTLS service-trust graph and admits only cryptographically authorized trust relationships — verified via Ed25519 signature checks and X.509 certificate revocation lookups against a PKI verifier — into the production trust store."
authors = [{ name = "Suraj Rawani", email = "SurajRawani1919@users.noreply.github.com" }]
keywords = [
  "mtls",
  "security",
  "cryptography",
  "ed25519",
  "x509",
  "certificate-revocation",
  "pki",
  "trust-graph",
  "signature-verification",
  "cpp",
]

[metadata]
author_name = "Suraj Rawani"
author_email = "SurajRawani1919@users.noreply.github.com"
difficulty = "hard"
difficulty_explanation = "Requires C++ cryptographic graph repair, Ed25519 signature verification, certificate revocation checks, live XSD validation, and fail-closed API-gated persistence."
category = "security"
domain = "Security & Cryptography"
subcategories = ["api_integration", "tool_specific"]
tags = ["mtls", "ed25519", "x509", "pki", "certificate-revocation", "access-control"]
codebase_size = "small"
number_of_milestones = 0
languages = ["cpp", "python", "sql"]
expert_time_estimate_min = 180
junior_time_estimate_min = 480

[verifier]
timeout_sec = 900.0

[agent]
timeout_sec = 1800.0

[solution]
timeout_sec = 1800.0

[environment]
allow_internet = true
network_mode = "public"
build_timeout_sec = 1200.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
env = { DATABASE_URL = "postgresql://mtls:mtls@127.0.0.1:5432/mtls_trust", FLASK_VERIFIER_URL = "http://127.0.0.1:5001" }

[environment.healthcheck]
command = "test -f /app/database/schema.sql"
interval_sec = 5.0
timeout_sec = 30.0
retries = 3
