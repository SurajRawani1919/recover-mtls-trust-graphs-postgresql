schema_version = "1.3"

[task]
name = "snorkel/recover-mtls-trust-graphs-postgresql"
description = "Repair corrupted mTLS GraphML trust graphs, verify via Flask API, and bulk-load verified records into PostgreSQL with a C++ libpq COPY pipeline."
authors = [{ name = "Snorkel Terminus", email = "tasks@snorkel.ai" }]
keywords = [
  "cpp",
  "postgresql",
  "libpq",
  "graphml",
  "mtls",
  "ed25519",
  "flask",
  "security",
  "api-integration",
  "pytest",
]

[metadata]
difficulty = "hard"
difficulty_explanation = "Requires C++ XML repair, live XSD fetch/validation, HTTP verifier integration, and libpq COPY ingest with cryptographic edge cases."
category = "security"
domain = "Security & Cryptography"
subtypes = ["API Integration", "Tool Specific"]
tags = ["cryptography", "xml", "database", "docker"]

[verifier]
timeout_sec = 900.0

[agent]
timeout_sec = 3600.0

[solution]
timeout_sec = 1800.0

[environment]
network_mode = "public"
build_timeout_sec = 1200.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
env = { DATABASE_URL = "postgresql://mtls:mtls@127.0.0.1:5432/mtls_trust", FLASK_VERIFIER_URL = "http://127.0.0.1:5001" }

[environment.healthcheck]
command = "test -f /app/database/schema.sql"
interval_sec = 5.0
timeout_sec = 30.0
retries = 3
